<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#17141b">
<title>REVUP — Pukekohe GP</title>
<style>
:root{
  --tarmac:#17141b;
  --cream:#f0e7d3;
  --cream-dim:#b9ae95;
  --purple:#8a5cf6;
  --purple-glow:#a985ff;
  --heat:#e3492b;
  --disp:"Avenir Next Condensed","Arial Narrow","Helvetica Neue Condensed","Liberation Sans Narrow",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--tarmac);
  color:var(--cream);
  font-family:var(--disp);
  overflow:hidden;
  height:100dvh;
  user-select:none;-webkit-user-select:none;
  cursor:pointer;
}

/* ---------- background / title screen ---------- */
#stage{
  position:fixed; inset:0;
  background:#000 center/cover no-repeat;
  background-image:url("screens/background.png");
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
}
/* legibility wash so the floating text reads on any background art */
#stage::after{
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(120% 80% at 50% 30%, transparent 40%, rgba(0,0,0,.55) 100%),
    linear-gradient(180deg, rgba(0,0,0,.25) 0%, transparent 30%, transparent 55%, rgba(0,0,0,.72) 100%);
  pointer-events:none;
}

/* ---------- floating start prompt ---------- */
#prompt{
  position:relative; z-index:2;
  text-align:center;
  margin-bottom:14vh;
  animation:float 3.4s ease-in-out infinite;
}
#prompt .eyebrow{
  font-size:clamp(11px,2.4vw,15px);
  letter-spacing:6px; text-transform:uppercase;
  color:var(--cream-dim);
  margin-bottom:10px;
}
#start{
  display:inline-block;
  font-size:clamp(38px,10vw,86px);
  font-weight:800; line-height:.92;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--cream);
  text-shadow:0 0 22px rgba(138,92,246,.65), 0 4px 18px rgba(0,0,0,.7);
  animation:pulse 2.1s ease-in-out infinite;
}
#start .metal{
  color:var(--heat);
  text-shadow:0 0 26px rgba(227,73,43,.7), 0 4px 18px rgba(0,0,0,.7);
}
#hint{
  position:relative; z-index:2;
  font-size:clamp(10px,2.2vw,13px);
  letter-spacing:3px; text-transform:uppercase;
  color:var(--cream-dim);
  margin-bottom:6vh;
  opacity:.85;
}

/* ---------- sound toggle (only shows if autoplay was blocked) ---------- */
#soundNote{
  position:fixed; z-index:3; top:14px; right:14px;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:var(--cream); background:rgba(75,47,168,.55);
  border:1px solid var(--purple);
  border-radius:999px; padding:7px 14px;
  display:none; align-items:center; gap:7px;
  box-shadow:0 0 14px rgba(138,92,246,.4);
}
#soundNote.show{display:flex}

/* ---------- fade-to-black transition ---------- */
#fade{
  position:fixed; inset:0; z-index:40;
  background:#000; opacity:0; pointer-events:none;
  transition:opacity .9s ease;
}
#fade.on{opacity:1}

/* ---------- car-themed loading screen ---------- */
#loader{
  position:fixed; inset:0; z-index:50;
  background:radial-gradient(120% 100% at 50% 32%, #221a2d 0%, #17141b 68%, #0c0a10 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:clamp(26px,5vh,40px);
  transition:opacity .6s ease;
}
#loader.done{opacity:0; pointer-events:none}
.load-title{
  font-size:clamp(46px,13vw,120px);
  font-weight:800; letter-spacing:9px; line-height:.9;
  color:var(--cream);
  text-shadow:0 0 34px rgba(138,92,246,.4);
}
.load-title b{
  color:var(--heat); font-weight:800;
  text-shadow:0 0 34px rgba(227,73,43,.55);
}
/* F1 starting-light gantry */
.gantry{
  display:flex; gap:clamp(9px,3.2vw,24px);
  padding:clamp(10px,2.4vw,16px) clamp(14px,3.4vw,24px);
  border-radius:16px;
  background:linear-gradient(180deg,#0c0a10,#050406);
  box-shadow:0 12px 34px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
}
.lamp{
  width:clamp(28px,7.6vw,50px); height:clamp(28px,7.6vw,50px);
  border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #571a12, #290c08 72%);
  box-shadow:inset 0 2px 7px rgba(0,0,0,.75);
  transition:background .1s ease, box-shadow .1s ease;
}
.lamp.on{
  background:radial-gradient(circle at 38% 34%, #ff8163, #ff2d10 52%, #b91d09 100%);
  box-shadow:0 0 24px 5px rgba(255,58,28,.7), inset 0 2px 6px rgba(0,0,0,.25);
}
.load-bar{
  width:min(66vw,340px); height:6px; border-radius:99px;
  background:#2a2436; overflow:hidden;
}
.load-fill{
  height:100%; width:0;
  background:linear-gradient(90deg,var(--purple),var(--heat));
  border-radius:99px;
}
.load-status{
  font-size:clamp(11px,2.6vw,14px);
  letter-spacing:3px; text-transform:uppercase;
  color:var(--cream-dim); min-height:16px; text-align:center;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-9px)}
}
@keyframes pulse{
  0%,100%{opacity:1; text-shadow:0 0 22px rgba(138,92,246,.65),0 4px 18px rgba(0,0,0,.7)}
  50%{opacity:.72; text-shadow:0 0 8px rgba(138,92,246,.3),0 4px 18px rgba(0,0,0,.7)}
}
@media (prefers-reduced-motion: reduce){
  #prompt,#start{animation:none}
}
</style>
</head>
<body>

<!-- ===== title screen (revealed after loading) ===== -->
<div id="stage" role="button" tabindex="0" aria-label="Start game">
  <div id="prompt">
    <div class="eyebrow">New Zealand International Grand Prix · Pukekohe</div>
    <div id="start">Start <span class="metal">Game</span></div>
  </div>
  <div id="hint">Tap anywhere to race</div>
</div>

<div id="soundNote">🔊 Tap to enable sound</div>
<div id="fade"></div>

<!-- ===== car-themed loading screen (shown first) ===== -->
<div id="loader">
  <div class="load-title">REV<b>UP</b></div>
  <div class="gantry">
    <div class="lamp"></div><div class="lamp"></div><div class="lamp"></div>
    <div class="lamp"></div><div class="lamp"></div>
  </div>
  <div>
    <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
    <p class="load-status" id="loadStatus">Warming up the engine…</p>
    <p class="load-status" id="loadSound" style="display:none; margin-top:12px; color:var(--purple-glow)">🔊 Tap anywhere to start the music</p>
  </div>
</div>

<!-- opening.mp3 is the attract music; it keeps playing through to the game -->
<audio id="opening" src="audio/opening.mp3" loop preload="auto"></audio>

<script>
/* ============================================================
   Where the "Tap anywhere" hands off to. Keep this matching your
   game file's name. Spaces in filenames need URL-encoding, so a
   plain name like game.html is tidiest.
   ============================================================ */
const GAME_URL = "game.html";

const stage    = document.getElementById("stage");
const opening  = document.getElementById("opening");
const fade     = document.getElementById("fade");
const soundNote= document.getElementById("soundNote");
const loader   = document.getElementById("loader");
const loadFill = document.getElementById("loadFill");
const loadStatus = document.getElementById("loadStatus");
const loadSound = document.getElementById("loadSound");
const lamps    = [...loader.querySelectorAll(".lamp")];

opening.volume = 0.7;

/* ---------------- MUSIC START ----------------
   Browsers refuse to play audio with sound until the page has received a
   user gesture — there is no way around that rule, and a loading screen
   that appears on its own has had no gesture yet. So we do two things:
     1) TRY to play immediately (works for returning visitors / installed
        apps / browsers whose autoplay policy is relaxed), and
     2) if that's blocked, start the music on the very FIRST tap, touch or
        key anywhere — including a tap on the loading screen. That first
        gesture only starts the music; it never skips ahead to the game.
   Once it's playing it keeps going, and its position is handed to
   game.html so the track continues seamlessly into the race screen. */
let musicOn = false;

function startMusic(){
  if(musicOn) return;
  opening.play().then(() => {
    musicOn = true;
    soundNote.classList.remove("show");
    if(loadSound) loadSound.style.display = "none";
    removeUnlock();
  }).catch(() => {
    // still blocked: surface the "tap to start" prompt on whichever screen shows
    if(loader.style.display !== "none" && !loader.classList.contains("done")){
      if(loadSound) loadSound.style.display = "block";
    } else {
      soundNote.classList.add("show");
    }
  });
}

function onUnlock(){ startMusic(); }
function removeUnlock(){
  ["pointerdown","touchstart","keydown"].forEach(ev =>
    window.removeEventListener(ev, onUnlock, true));
}
["pointerdown","touchstart","keydown"].forEach(ev =>
  window.addEventListener(ev, onUnlock, true));

// attempt right away, in case the browser lets us autoplay
startMusic();

/* ---------------- LOADING SCREEN ----------------
   Real gate: don't finish until background.png has loaded (plus a
   short minimum so the lights read, and a hard timeout so a missing
   asset can never hang the screen forever). */
let launched = false;
const t0 = performance.now();
const MIN_MS = 1500, MAX_MS = 9000;
let bgLoaded = false;
let progress = 0;

const bg = new Image();
bg.onload = bg.onerror = () => { bgLoaded = true; };
bg.src = "screens/background.png";
try { opening.load(); } catch(e){}

function renderLoad(p){
  loadFill.style.width = (p*100).toFixed(1) + "%";
  lamps.forEach((l,i) => l.classList.toggle("on", p >= (i+1)/5 - 0.001));
  loadStatus.textContent =
    p < 0.2 ? "Warming up the engine…" :
    p < 0.4 ? "Priming the fuel pump…" :
    p < 0.6 ? "Checking tyre pressures…" :
    p < 0.8 ? "Rolling onto the grid…" :
    p < 1   ? "Formation lap…" : "Lights out!";
}

function loadFrame(now){
  const elapsed = now - t0;
  const ready = (bgLoaded && elapsed >= MIN_MS) || elapsed >= MAX_MS;
  const target = ready ? 1 : 0.9;
  progress += (target - progress) * 0.06;
  if (target === 1 && progress > 0.995) progress = 1;
  renderLoad(progress);
  if (progress >= 1) { finishLoad(); return; }
  requestAnimationFrame(loadFrame);
}

function finishLoad(){
  renderLoad(1);                       // all 5 lights on
  setTimeout(() => {                    // hold, then "lights out"
    lamps.forEach(l => l.classList.remove("on"));
    loadStatus.textContent = "Go!";
    setTimeout(() => {
      loader.classList.add("done");
      revealTitle();
      setTimeout(() => { loader.style.display = "none"; }, 650);
    }, 260);
  }, 500);
}

/* Reveal the title screen and (re)try the attract music. If it's still
   blocked here, startMusic() shows the tap-to-enable note. */
function revealTitle(){
  startMusic();
}

requestAnimationFrame(loadFrame);

/* ---------------- TITLE → GAME HANDOFF ----------------
   No start sound here anymore: the music keeps playing. We just save
   its position so game.html can pick it up seamlessly, then hand off. */
function handleActivate(){
  if (launched) return;
  launched = true;
  startMusic();                                       // make sure it's playing
  soundNote.classList.remove("show");
  fade.classList.add("on");
  setTimeout(() => {
    try { sessionStorage.setItem("heat_openingTime", String(opening.currentTime || 0)); } catch(e){}
    window.location.href = GAME_URL;
  }, 650);
}

stage.addEventListener("pointerdown", handleActivate);
stage.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleActivate(); }
});
</script>
</body>
</html>
