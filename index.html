<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#17141b">
<title>HEAT — Pukekohe GP</title>
<style>
:root{
  --tarmac:#17141b; --panel:#221d2b; --panel2:#2c2536;
  --cream:#f0e7d3; --cream-dim:#b9ae95;
  --purple:#8a5cf6; --purple-deep:#4b2fa8; --purple-glow:#a985ff;
  --heat:#e3492b; --heat-dim:#8a3520;
  --cool:#3fa7d6; --grass:#3e5039;
  --stress:#d8c23a;
  --disp:"Avenir Next Condensed","Arial Narrow","Helvetica Neue Condensed","Liberation Sans Narrow",system-ui,sans-serif;
  --mono:"SF Mono","Roboto Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--tarmac); color:var(--cream);
  font-family:var(--disp); overflow:hidden;
  display:flex; flex-direction:column; height:100dvh;
  user-select:none;-webkit-user-select:none;
}
/* ---------- header ---------- */
#topbar{
  display:flex; align-items:center; gap:10px; padding:8px 12px 6px;
  border-bottom:1px solid #000;
  background:linear-gradient(180deg,#241d31,#1a1622);
}
#topbar .badge{
  background:var(--purple-deep); color:#fff; border:2px solid var(--purple);
  border-radius:50%; width:34px;height:34px; display:flex;align-items:center;justify-content:center;
  font-weight:800; font-size:15px; flex:none;
  box-shadow:0 0 10px rgba(138,92,246,.5);
}
#topbar h1{font-size:17px; letter-spacing:2.5px; text-transform:uppercase; font-weight:800; line-height:1}
#topbar .sub{font-size:10px; letter-spacing:2px; color:var(--cream-dim); text-transform:uppercase; margin-top:2px}
#standings{margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; max-width:46%}
.pos-chip{
  width:18px;height:18px;border-radius:50%; display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#111; border:1px solid rgba(0,0,0,.5);
}
/* landing-spot highlight bands on the track */
.landhl{pointer-events:none}
.landhl.exact{opacity:.55}
.landhl.range{opacity:.30}
/* ---------- track ---------- */
#trackwrap{position:relative; background:var(--grass); flex:none; touch-action:none}
#tracksvg{display:block; width:100%; height:auto}
#lapflag{
  position:absolute; top:6px; left:8px; font-size:11px; letter-spacing:1.5px;
  background:rgba(20,16,28,.82); padding:4px 9px; border-radius:4px;
  color:var(--cream); text-transform:uppercase; border:1px solid #000;
}
#weathernote{position:absolute; top:6px; right:8px; font-size:10px; letter-spacing:1.5px;
  background:rgba(20,16,28,.82); padding:4px 9px; border-radius:4px; color:var(--cream-dim);
  text-transform:uppercase; border:1px solid #000;}
/* ---------- gauges strip ---------- */
#gauges{
  display:flex; justify-content:space-around; align-items:stretch;
  padding:7px 6px; gap:6px;
  background:
    radial-gradient(circle at 20% -40%, #3a2f52 0%, transparent 60%),
    linear-gradient(180deg,#2b2340,#1d1828);
  border-top:2px solid #0c0a10; border-bottom:2px solid #0c0a10;
}
.gauge{
  flex:1; text-align:center; border:1.5px solid #4a3f63; border-radius:10px;
  background:radial-gradient(circle at 50% 0%, #322a47, #201a2d 75%);
  padding:5px 2px 4px; box-shadow:inset 0 2px 6px rgba(0,0,0,.6);
  min-width:0;
}
.gauge .lbl{font-size:9px; letter-spacing:1.6px; color:var(--cream-dim); text-transform:uppercase}
.gauge .val{font-family:var(--mono); font-size:19px; font-weight:700; line-height:1.15; color:var(--cream)}
.gauge.heatg .val{color:var(--heat)} .gauge.speedg .val{color:var(--purple-glow)}
/* ---------- main panel ---------- */
#panel{flex:1; overflow-y:auto; padding:12px 12px 90px; -webkit-overflow-scrolling:touch}
.phase-title{font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--purple-glow); font-weight:800; margin-bottom:2px}
.phase-hint{font-size:12.5px; color:var(--cream-dim); font-family:system-ui,sans-serif; line-height:1.45; margin-bottom:12px}
/* gear gate */
#geargate{display:flex; gap:10px; align-items:center; justify-content:center; margin:6px 0 14px}
.gearopt{
  width:56px;height:56px;border-radius:50%; border:2px solid #4a3f63; background:#171221;
  color:var(--cream); font-size:22px; font-weight:800; display:flex;flex-direction:column;
  align-items:center;justify-content:center; position:relative; font-family:var(--disp);
}
.gearopt small{font-size:8px; letter-spacing:1px; color:var(--cream-dim); font-weight:600}
.gearopt.sel{border-color:var(--purple-glow); background:var(--purple-deep); box-shadow:0 0 14px rgba(138,92,246,.55)}
.gearopt.heatcost.sel{border-color:var(--heat)}
.gearopt:disabled{opacity:.28}
.gearopt .flame{position:absolute; top:-6px; right:-4px; font-size:12px}
/* cards */
#hand,#played{display:flex; gap:8px; overflow-x:auto; padding:6px 2px 10px; scrollbar-width:none}
#hand::-webkit-scrollbar,#played::-webkit-scrollbar{display:none}
.card{
  flex:none; width:66px; height:96px; border-radius:8px; position:relative;
  border:2px solid #000; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-weight:800; transition:transform .12s;
  box-shadow:0 3px 6px rgba(0,0,0,.5);
}
.card .cv{font-size:30px; line-height:1}
.card .ct{font-size:8.5px; letter-spacing:1.2px; text-transform:uppercase; margin-top:5px; opacity:.85; text-align:center; padding:0 3px}
.card.speed{background:linear-gradient(160deg,#6a48d8,#40277e); color:#fff}
.card.speed::after,.card.up::after{content:""; position:absolute; inset:4px; border:1px solid rgba(255,255,255,.28); border-radius:5px}
.card.up{background:linear-gradient(160deg,#8f6df2,#5636a8); color:#fff}
.card.up .cv::before{content:"▲▲"; display:block; font-size:8px; letter-spacing:2px; color:#d9c9ff}
.card.heatc{background:linear-gradient(160deg,#e3492b,#7c2410); color:#ffe6d2}
.card.heatc .cv{font-size:22px}
.card.stressc{background:linear-gradient(160deg,#c9b02c,#6d5c10); color:#fff}
.card.stressc .cv{font-size:26px}
.card.sel{transform:translateY(-9px); outline:3px solid var(--purple-glow); outline-offset:1px}
.card.dim{opacity:.38}
.card .pip{position:absolute; top:3px; left:5px; font-size:12px}
.card .pip.r{left:auto; right:5px}
/* buttons */
.btnrow{display:flex; flex-wrap:wrap; gap:9px; margin-top:6px}
button.act{
  font-family:var(--disp); font-weight:800; letter-spacing:1.6px; text-transform:uppercase;
  font-size:13.5px; padding:13px 18px; border-radius:9px; border:2px solid var(--purple);
  background:linear-gradient(180deg,#6a45d8,#4b2fa8); color:#fff; flex:1; min-width:120px;
  box-shadow:0 3px 0 #2c1a66;
}
button.act:active{transform:translateY(2px); box-shadow:0 1px 0 #2c1a66}
button.act.secondary{background:#241d31; border-color:#4a3f63; color:var(--cream); box-shadow:0 3px 0 #0e0b14}
button.act.hot{background:linear-gradient(180deg,#e3562b,#9c2c12); border-color:#ff9b6a; box-shadow:0 3px 0 #5c1a08}
button.act.cool{background:linear-gradient(180deg,#3fa7d6,#1f6a94); border-color:#8fd4f2; box-shadow:0 3px 0 #124158}
button.act:disabled{opacity:.35; pointer-events:none}
/* engine heat pips */
#enginebar{display:flex; gap:5px; align-items:center; margin:4px 0 10px; flex-wrap:wrap}
#enginebar .elbl{font-size:10px; letter-spacing:2px; color:var(--cream-dim); text-transform:uppercase; margin-right:4px}
.hpip{width:15px; height:22px; border-radius:3px; background:linear-gradient(180deg,#ff7a3d,#c22c0d); border:1px solid #000; box-shadow:0 0 6px rgba(227,73,43,.5)}
.hpip.empty{background:#241d31; box-shadow:none; border-color:#3a3148}
/* corner-heat forecast strip */
.forecast{font-family:system-ui,sans-serif; font-size:12.5px; line-height:1.45; border-radius:8px;
  padding:8px 11px; margin:2px 0 10px; border:1.5px solid #4a3f63; background:#1d1828; color:var(--cream-dim)}
.forecast b{color:var(--cream)}
.forecast.warn{border-color:var(--heat); color:#ffd9c8; background:#2a160f}
.forecast.warn b{color:#ffb08a}
.forecast.spin{border-color:#ff5a3c; color:#fff; background:#571507; font-weight:700}
/* log */
#logwrap{position:fixed; left:0; right:0; bottom:0; z-index:30;
  background:linear-gradient(180deg,#141019 0,#0d0a12 100%); border-top:2px solid #000;}
#logtoggle{width:100%; text-align:left; background:none; border:none; color:var(--cream-dim);
  font-family:var(--mono); font-size:11px; padding:8px 14px; letter-spacing:.4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
#logbody{max-height:0; overflow-y:auto; transition:max-height .25s; padding:0 14px; font-family:var(--mono); font-size:11px; line-height:1.7; color:var(--cream-dim)}
#logwrap.open #logbody{max-height:34dvh; padding-bottom:12px}
#logbody .me{color:var(--purple-glow)} #logbody .warn{color:var(--heat)}
/* overlays */
.overlay{position:fixed; inset:0; z-index:50; background:rgba(10,8,14,.93); display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto}
.sheet{width:100%; max-width:420px; background:linear-gradient(180deg,#2b2340,#1c1727); border:2px solid var(--purple-deep); border-radius:16px; padding:22px; box-shadow:0 10px 40px rgba(0,0,0,.7)}
.sheet h2{font-size:24px; letter-spacing:3px; text-transform:uppercase; color:#fff}
.sheet h2 span{color:var(--purple-glow)}
.sheet .tag{font-size:10px; letter-spacing:2.5px; color:var(--cream-dim); text-transform:uppercase; margin-bottom:16px}
.optgroup{margin:14px 0}
.optgroup .olbl{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--cream-dim); margin-bottom:7px}
.seg{display:flex; gap:7px}
.seg button{flex:1; padding:11px 4px; border-radius:8px; border:2px solid #4a3f63; background:#171221; color:var(--cream); font-family:var(--disp); font-weight:700; font-size:14px; letter-spacing:1px}
.seg button.sel{border-color:var(--purple-glow); background:var(--purple-deep)}
.standrow{display:flex; align-items:center; gap:12px; padding:9px 6px; border-bottom:1px solid #362c4d; font-size:16px}
.standrow .p{font-family:var(--mono); font-weight:700; width:26px; color:var(--cream-dim)}
.standrow .dot{width:16px;height:16px;border-radius:50%;border:1px solid #000}
/* toast */
#toast{position:fixed; top:14%; left:50%; transform:translate(-50%,0); z-index:60;
  background:rgba(20,15,30,.95); border:2px solid var(--purple); color:var(--cream);
  border-radius:12px; padding:14px 22px; font-size:15px; letter-spacing:1px; font-weight:700;
  text-transform:uppercase; opacity:0; pointer-events:none; transition:opacity .25s; text-align:center; max-width:86%;}
#toast.show{opacity:1}
#toast.hot{border-color:var(--heat); color:#ffd9c8}
/* track svg bits */
.spaceline{stroke:#5b5364; stroke-width:1}
.cornerline{stroke:#ffb03d; stroke-width:2.5}
.car{transition:transform .55s cubic-bezier(.3,.9,.4,1)}
@media (prefers-reduced-motion: reduce){ .car{transition:none} .card{transition:none} }
.cornerbadge circle{fill:#f0e7d3; stroke:#111; stroke-width:2}
.cornerbadge text{font-family:var(--disp); font-weight:800; fill:#111; text-anchor:middle}
#turnptr{transition:transform .55s ease}
</style>
</head>
<body>

<div id="topbar">
  <div class="badge">17</div>
  <div>
    <h1>Heat <span style="color:var(--purple-glow)">·</span> Pukekohe</h1>
    <div class="sub" id="roundlbl">New Zealand Grand Prix</div>
  </div>
  <div id="standings"></div>
</div>

<div id="trackwrap">
  <svg id="tracksvg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="lapflag">Lap –</div>
  <div id="weathernote">73 spaces · 4 corners</div>
</div>

<div id="gauges">
  <div class="gauge"><div class="lbl">Gear</div><div class="val" id="g-gear">1</div></div>
  <div class="gauge heatg"><div class="lbl">Engine</div><div class="val" id="g-heat">–</div></div>
  <div class="gauge speedg"><div class="lbl">Speed</div><div class="val" id="g-speed">–</div></div>
  <div class="gauge"><div class="lbl">Hand</div><div class="val" id="g-hand">7</div></div>
  <div class="gauge"><div class="lbl">Position</div><div class="val" id="g-pos">–</div></div>
</div>

<div id="panel"></div>

<div id="logwrap">
  <button id="logtoggle" onclick="document.getElementById('logwrap').classList.toggle('open')">▸ race radio…</button>
  <div id="logbody"></div>
</div>

<div id="toast"></div>
<div id="setup" class="overlay"></div>

<script>
"use strict";
/* =====================================================================
   HEAT — fan-made digital adaptation for personal play.
   Core round structure per the published rules; original visuals.
   ===================================================================== */

/* ---------------- Track: Pukekohe (fan board: 73 spaces, 4 corners, 2 laps)
   Geometry traced from the printed board art (tracks/Pukekohe.jpeg, 3:2).
   Space 0 = first space past the finish line; travel heads "west" into the
   infield esses, up the outer edge, along the top and around the right
   hairpin back to the flag. Corner indices/limits match the board:
   3 (infield entry), 3 (bottom-left), 7 (top-left), 4 (right hairpin). */
const TRACK = {
  name:"Pukekohe", spaces:73, defaultLaps:2, heat:6, stress:3,
  image:"tracks/Pukekohe.jpeg", imgW:1200, imgH:800,
  // corner line sits *before* the space index given; crossing into it triggers the check
  corners:[ {at:9, limit:3}, {at:15, limit:3}, {at:32, limit:7}, {at:57, limit:4} ],
  legendsLine:7,  // distance before a corner where AI rivals switch to "clearing" logic
  // centre of each of the 73 printed spaces, in image coordinates
  spacePts:[[509,571],[466,553],[439,520],[409,527],[366,510],[325,489],[283,470],[240,457],[194,459],[155,488],[132,525],[111,557],[156,582],[178,626],[190,676],[177,723],[136,745],[92,749],[64,713],[48,669],[46,623],[48,577],[53,530],[56,484],[57,437],[62,391],[64,345],[71,299],[73,253],[74,206],[77,160],[83,114],[104,74],[146,60],[190,59],[233,47],[277,52],[321,52],[365,51],[410,50],[454,51],[498,52],[543,50],[587,45],[631,42],[675,43],[719,49],[762,59],[804,73],[846,87],[888,103],[929,121],[969,139],[1010,157],[1050,176],[1091,192],[1124,221],[1135,265],[1116,310],[1070,327],[1021,336],[973,346],[930,370],[888,396],[849,427],[826,470],[803,514],[778,556],[742,590],[697,610],[648,615],[599,606],[553,589]]
};
const S = TRACK.spaces;

/* ---------------- game state */
const G = {
  laps:2, difficulty:0, players:[], round:0,
  legendDeck:[], legendCard:null, legendRevealed:false,
  queue:[], active:null, stage:"setup",
  finishOrder:[], adrenalineIds:[]
};

const BOT_POOL = [ 
  {name:"No. 1 Le Cock",    color:"#3f8f4e"},
  {name:"No. 3 Ballbag", color:"#e07b28"},
  {name:"No. 2 Clogger",  color:"#4aa3d8"},
  {name:"No. 69 Powercord",    color:"#000100"},
  {name:"No. 8 Eagle",  color:"#d84b3a"},
  {name:"No. 21 Kereru",   color:"#d9b23a"},
  {name:"No. 44 Dr CK",     color:"#d86b9e"}
];

/* Legend cards: top speed + diamond value (approximating the module deck) */
const LEGEND_CARDS = [
  {ts:11,d:1},{ts:12,d:0},{ts:12,d:3},{ts:13,d:2},{ts:14,d:1},
  {ts:15,d:3},{ts:16,d:2},{ts:17,d:0},{ts:10,d:2},{ts:18,d:1}
];

/* ---------------- helpers */
const $ = s => document.querySelector(s);
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const phys = t => ((t % S) + S) % S;
function log(msg, cls){
  const el = document.createElement("div"); if(cls) el.className = cls;
  el.textContent = msg;
  $("#logbody").prepend(el);
  $("#logtoggle").textContent = "▸ " + msg;
}
let toastTimer=null;
function toast(msg, hot){
  const t=$("#toast"); t.textContent=msg; t.className = hot ? "show hot" : "show";
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 2100);
}
const wait = ms => new Promise(r=>setTimeout(r,ms));
window.G = G; // exposed for debugging/tests
/* stale-tap guard: every interactive stage arms a token; handlers from a
   previous render (detached panels, double-taps) become no-ops */
let uiToken=0;
const arm = () => ++uiToken;
const live = tk => tk===uiToken;

/* ---------------- cards */
function makeCard(t,v){ return {t, v:(v===undefined?null:v), id:Math.random().toString(36).slice(2)}; }
function cardLabel(c){
  switch(c.t){
    case "speed": return {cv:c.v, ct:"Speed", cls:"speed"};
    case "up0":   return {cv:0,  ct:"Start upgrade", cls:"up"};
    case "up5":   return {cv:5,  ct:"Start upgrade", cls:"up"};
    case "upheat":return {cv:"♨", ct:"Upgrade heat", cls:"heatc"};
    case "heat":  return {cv:"♨", ct:"Heat", cls:"heatc"};
    case "stress":return {cv:"＋", ct:"Stress", cls:"stressc"};
  }
}
const isHeat   = c => c.t==="heat" || c.t==="upheat";
const isStress = c => c.t==="stress";
const isSpeed14= c => c.t==="speed";           // "original 1–4" cards only
const discardable = c => !isHeat(c) && !isStress(c);

/* ---------------- heat conservation
   The map defines the total pool of Heat per car (Pukekohe: 6). Weather /
   road-condition modifiers would adjust heatCap(), never the invariant:
   engine + Heat cards in deck/discard/hand/play must NEVER exceed the cap.
   The starting "upgrade Heat" card counts as one of those 6 — it starts in
   the deck, so the engine starts with cap−1. Cooling it down (hand→engine)
   is a transfer, not creation. */
const WEATHER_HEAT_MOD = 0; // hook for weather car-setup tokens (+1 / −1 etc.)
function heatCap(){ return TRACK.heat + WEATHER_HEAT_MOD; }
function totalHeat(p){
  const n = a => a.filter(isHeat).length;
  return p.engine + n(p.deck) + n(p.discard) + n(p.hand) + n(p.play);
}
/* defensive check after every heat mutation: clamp + shout if the pool grew */
function auditHeat(p, ctx){
  if(p.isBot) return;
  const t = totalHeat(p), cap = heatCap();
  if(t > cap){
    const over = t - cap;
    p.engine = Math.max(0, p.engine - over);
    log(`Heat audit (${ctx}): pool hit ${t}/${cap} — engine clamped by ${over}.`, "warn");
  }
}

/* ---------------- players */
function makeHuman(){
  const deck = [];
  for(let v=1; v<=4; v++) for(let i=0;i<3;i++) deck.push(makeCard("speed",v));
  deck.push(makeCard("up0"), makeCard("up5"), makeCard("upheat"));
  for(let i=0;i<TRACK.stress;i++) deck.push(makeCard("stress"));
  shuffle(deck);
  return {
    id:"you", name:"No. 17 — You", color:"#8a5cf6", isBot:false,
    // engine holds cap−1: the 6th Heat is the upgrade Heat card riding in the deck
    total:0, spot:0, gear:1, engine:heatCap()-1,
    deck, discard:[], hand:[], play:[],
    finished:false, finishRound:null,
    // per-round scratch
    speed:0, crossings:[], boostUsed:false, cooldownLeft:0,
    adrenaline:false, adrSpeedUsed:false, cluttered:false, spunOut:false
  };
}
function makeBot(i){
  const b = BOT_POOL[i];
  return { id:"bot"+i, name:b.name, color:b.color, isBot:true,
    total:0, spot:0, finished:false, finishRound:null };
}

/* ---------------- deck ops */
function draw(p){
  if(p.deck.length===0){
    if(p.discard.length===0) return null;
    p.deck = shuffle(p.discard); p.discard = [];
    log("You reshuffle your discard into a new draw deck.");
  }
  return p.deck.pop();
}
function drawToHand(p,n){
  for(let i=0;i<n;i++){ const c=draw(p); if(!c) break; p.hand.push(c); }
}
/* flip from deck until an original 1–4 Speed card appears (stress / boost) */
function flipForSpeed(p){
  const junk=[];
  let tries = p.deck.length + p.discard.length + 2; // one full cycle max
  while(tries-- > 0){
    const c = draw(p);
    if(!c) break;
    if(isSpeed14(c)) return {v:c.v, card:c, junk};
    junk.push(c); p.discard.push(c);
  }
  return {v:0, junk}; // no speed cards reachable — treat as 0
}

/* ---------------- occupancy & movement */
function carsAt(space, exclude){
  return G.players.filter(p => !p.finished && p!==exclude && phys(p.total)===space);
}
function spaceFull(space, exclude){ return carsAt(space, exclude).length >= 2; }
function takeSpot(p){
  const others = carsAt(phys(p.total), p);
  p.spot = others.some(o=>o.spot===0) ? 1 : 0;
}
/* move exactly dist; if landing space full, fall back to nearest free space behind.
   Records corner-line crossings on the car for the corner check step. */
function moveCar(p, dist, opts={}){
  if(dist<=0) return 0;
  const from = p.total;
  let target = from + dist;
  while(target>from && spaceFull(phys(target), p)) target--;
  if(target===from) return 0;
  p.total = target; takeSpot(p);
  if(opts.trackCrossings!==false && !p.isBot){
    for(const c of cornerTotals()){
      if(from < c && target >= c && c <= G.laps*S) p.crossings.push(c);
    }
  }
  renderCars();
  return target-from;
}
function cornerTotals(){
  const out=[];
  for(let lap=0; lap<G.laps; lap++) for(const c of TRACK.corners) out.push(lap*S + c.at);
  return out.sort((a,b)=>a-b);
}
function limitAt(cornerTotal){
  const at = cornerTotal % S;
  return TRACK.corners.find(c=>c.at===at).limit;
}
function nextCornerTotal(total){
  for(const c of cornerTotals()) if(c > total) return c;
  return Infinity; // past all corners → run to the flag
}
const finishedLine = p => p.total >= G.laps*S;

/* ---------------- corner-heat forecasting
   Speed for the check = all card values + boost + adrenaline. Distance moved
   equals speed pre-blocking, so projecting "move d from here" doubles as
   "check corners at speed d" for the pre-boost estimate. */
function crossingsForMove(from, dist){
  const out=[];
  for(const c of cornerTotals()) if(from < c && from+dist >= c && c <= G.laps*S) out.push(c);
  return out;
}
function cornerHeatCost(speed, crossTotals){
  let n=0;
  for(const ct of [...new Set(crossTotals)]) n += Math.max(0, speed - limitAt(ct));
  return n;
}
/* strip shown in Reveal/React: what the Check Corner step will bill you */
function heatForecastHTML(you, speed, crossings, label){
  const pre = label || "Corner check";
  const uniq = [...new Set(crossings)].sort((a,b)=>a-b);
  if(uniq.length===0){
    const nc = nextCornerTotal(you.total);
    const nxt = nc===Infinity ? "no corners left before the flag"
      : `next corner line in ${nc-you.total} space${nc-you.total===1?"":"s"}, limit ${limitAt(nc)}`;
    return `<div class="forecast">${pre}: no corner line crossed yet — ${nxt}.</div>`;
  }
  const cost = cornerHeatCost(speed, uniq);
  const lims = uniq.map(ct=>limitAt(ct)).join(" & ");
  if(cost===0)
    return `<div class="forecast">${pre}: limit-${lims} corner${uniq.length>1?"s":""} crossed at speed ${speed} — clean, <b>no Heat owed</b>.</div>`;
  if(cost<=you.engine)
    return `<div class="forecast warn">${pre}: speed ${speed} vs limit ${lims} — <b>${cost} Heat</b> will leave the engine (${you.engine} in engine).</div>`;
  return `<div class="forecast spin">${pre}: ${cost} Heat owed but only ${you.engine} in the engine — ⚠ SPIN OUT!</div>`;
}

/* ---------------- race start */
function startRace(botCount){
  G.players = [makeHuman()];
  for(let i=0;i<botCount;i++) G.players.push(makeBot(i));
  // starting grid: staggered spots just past the finish line
  const grid = shuffle([...G.players]);
  const slots = []; // 8 slots in the printed grid boxes behind the flag, pole first
  for(let i=0;i<8;i++) slots.push({t:-(1+Math.floor(i/2)), s:i%2});
  grid.forEach((p,i)=>{ p.total=slots[i].t; p.spot=slots[i].s; });
  G.legendDeck = shuffle([...LEGEND_CARDS]);
  G.round=0; G.finishOrder=[];
  const you = G.players[0];
  drawToHand(you,7);
  log(`Lights out at ${TRACK.name}! ${G.laps} lap${G.laps>1?"s":""}, ${botCount} rival${botCount>1?"s":""}.`,"me");
  renderCars(); renderGauges();
  startRound();
}

/* ---------------- round flow */
function startRound(){
  G.round++;
  const you = G.players[0];
  you.speed=0; you.crossings=[]; you.boostUsed=false; you.adrenaline=false;
  you.adrSpeedUsed=false; you.cluttered=false; you.spunOut=false; you.play=[];
  G.legendCard=null; G.legendRevealed=false;
  $("#roundlbl").textContent = `Round ${G.round}`;
  renderGauges();
  if(you.finished){ // player done: sim remaining bots quickly
    runBotsOnly();
    return;
  }
  stageShift();
}

/* ---- 1. Shift Gears */
function stageShift(){
  const tk=arm();
  const you=G.players[0];
  let pick=you.gear;
  const opts=[];
  for(let g=Math.max(1,you.gear-2); g<=Math.min(4,you.gear+2); g++) opts.push(g);
  const playableN = you.hand.filter(c=>!isHeat(c)).length;
  const heatN = you.hand.length - playableN;
  const panel=$("#panel");
  panel.innerHTML = `
    <div class="phase-title">1 · Shift gears</div>
    <div class="phase-hint">One step is free. Jumping two gears costs <b style="color:var(--heat)">1 Heat</b>, paid now. Your gear sets how many cards you must play.</div>
    <div id="geargate"></div>
    ${engineBarHTML(you)}
    <div class="phase-hint" style="margin:4px 0 0">Your hand — <b>${playableN}</b> playable${heatN?`, <b style="color:var(--heat)">${heatN}♨</b> stuck (Heat can't be played)`:""}:</div>
    <div id="hand"></div>
    <div class="btnrow"><button class="act" id="confirmgear">Engage gear <span id="gpick">${pick}</span></button></div>`;
  /* read-only hand preview so gear choice is informed, like holding your cards at the table */
  const handEl=$("#hand");
  you.hand.forEach(c=>{
    const el=renderCard(c);
    if(isHeat(c)) el.classList.add("dim");
    handEl.appendChild(el);
  });
  const gate=$("#geargate");
  for(const g of opts){
    const two = Math.abs(g-you.gear)===2;
    const clut = g > playableN;
    const b=document.createElement("button");
    b.className="gearopt"+(two?" heatcost":"")+(g===pick?" sel":"");
    b.innerHTML = `${g}<small>${clut?'<span style="color:var(--heat)">clutter!</span>':g===you.gear?"stay":two?"±2":"±1"}</small>${two?'<span class="flame">🔥</span>':""}`;
    b.disabled = two && you.engine<1;
    b.onclick=()=>{ pick=g; [...gate.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); $("#gpick").textContent=g; };
    gate.appendChild(b);
  }
  $("#confirmgear").onclick=()=>{
    if(!live(tk)) return;
    if(Math.abs(pick-you.gear)===2){ payHeat(you,1); log(`You slam two gears (${you.gear}→${pick}) and pay 1 Heat.`,"me"); toast("2-gear shift · 1 Heat","hot"); }
    you.gear=pick; renderGauges();
    stagePlay();
  };
}

/* ---- 2. Play Cards */
function stagePlay(){
  const tk=arm();
  const you=G.players[0];
  const playable = you.hand.filter(c=>!isHeat(c));
  const cluttered = playable.length < you.gear;
  const sel=new Set();
  const panel=$("#panel");
  panel.innerHTML = `
    <div class="phase-title">2 · Play cards</div>
    <div class="phase-hint">${cluttered
      ? `<b style="color:var(--heat)">Cluttered hand!</b> Too many Heat cards to play gear ${you.gear}. You'll dump what you can, the car won't move, and you drop to 1st gear.`
      : `Gear ${you.gear}: choose exactly <b>${you.gear}</b> card${you.gear>1?"s":""}. Heat cards can't be played — cool them down instead. Stress ＋ draws a random speed.`}</div>
    <div id="hand"></div>
    <div class="phase-hint" id="landnote" style="min-height:18px;margin-bottom:6px"></div>
    <div class="btnrow"><button class="act" id="playbtn" disabled>Reveal &amp; drive</button></div>`;
  const handEl=$("#hand");
  /* preview where the selected cards would land the car (before boost /
     slipstream / blocking). Stress ＋ shows the possible band instead. */
  function updateLanding(){
    const note=$("#landnote"); if(!note) return;
    const chosen=you.hand.filter(c=>sel.has(c.id));
    const known=chosen.reduce((s,c)=> c.t==="speed"? s+c.v : c.t==="up5"? s+5 : s, 0);
    const nS=chosen.filter(isStress).length;
    if(chosen.length===0){ clearHighlights(); note.textContent=""; return; }
    /* projected Check Corner bill if this were the final speed (pre-boost/slipstream) */
    const bill = d => cornerHeatCost(d, crossingsForMove(you.total, d));
    if(nS===0){
      if(known===0){ clearHighlights(); note.textContent="These cards give 0 speed — no movement."; return; }
      highlightSpaces([{total:you.total+known, kind:"exact"}]);
      const cost=bill(known);
      let heatTxt="";
      if(cost>0){
        heatTxt = cost<=you.engine
          ? ` · Corner bill: <b style="color:var(--heat)">≈${cost} Heat</b> (engine ${you.engine})`
          : ` · <b style="color:#ff5a3c">⚠ SPIN OUT</b> — ${cost} Heat owed, engine only has ${you.engine}`;
      } else if(crossingsForMove(you.total,known).length){
        heatTxt = ` · crosses a corner <b style="color:#9fe08a">clean</b>`;
      }
      note.innerHTML=`Landing: <b style="color:var(--purple-glow)">+${known}</b> — highlighted on the track (before boost / slipstream; blocking ignored).${heatTxt}`;
    }else{
      const min=known+nS, max=known+nS*4;
      const items=[]; for(let d=min; d<=max; d++) items.push({total:you.total+d, kind:"range"});
      highlightSpaces(items);
      let cMin=Infinity, cMax=0;
      for(let d=min; d<=max; d++){ const c=bill(d); cMin=Math.min(cMin,c); cMax=Math.max(cMax,c); }
      let heatTxt="";
      if(cMax>0){
        if(cMin>you.engine) heatTxt = ` · <b style="color:#ff5a3c">⚠ SPIN OUT guaranteed</b> (${cMin}+ Heat owed, engine ${you.engine})`;
        else if(cMax>you.engine) heatTxt = ` · corner bill ≈${cMin}–${cMax} Heat — <b style="color:#ff5a3c">spin-out risk</b> (engine ${you.engine})`;
        else if(cMax>0) heatTxt = ` · corner bill <b style="color:var(--heat)">≈${cMin}–${cMax} Heat</b> (engine ${you.engine})`;
      }
      note.innerHTML=`Landing range: <b style="color:var(--stress)">+${min} to +${max}</b> — ${nS} stress ＋ card${nS>1?"s":""}, each flips 1–4.${heatTxt}`;
    }
  }
  you.hand.forEach(c=>{
    const el=renderCard(c);
    if(isHeat(c)) el.classList.add("dim");
    else el.onclick=()=>{
      if(cluttered) return;
      if(sel.has(c.id)) sel.delete(c.id); else if(sel.size<you.gear) sel.add(c.id);
      el.classList.toggle("sel", sel.has(c.id));
      $("#playbtn").disabled = sel.size!==you.gear;
      updateLanding();
    };
    handEl.appendChild(el);
  });
  updateLanding();
  const btn=$("#playbtn");
  if(cluttered){ btn.disabled=false; btn.textContent="Cluttered — coast this round"; btn.classList.add("hot"); }
  btn.onclick=()=>{
    if(!live(tk)) return;
    if(cluttered){
      you.cluttered=true;
      // rule: play every playable card, cover the difference with Heat; car doesn't move
      const down = you.hand.filter(c=>!isHeat(c));
      let need = you.gear - down.length;
      for(const c of you.hand){ if(need>0 && isHeat(c)){ down.push(c); need--; } }
      you.play = down;
      you.hand = you.hand.filter(c=>!down.includes(c));
      log("Cluttered hand: your car doesn't move this round. Gear drops to 1st.","warn");
      toast("Cluttered hand — no move","hot");
      you.gear=1;
    }else{
      you.play = you.hand.filter(c=>sel.has(c.id));
      you.hand = you.hand.filter(c=>!sel.has(c.id));
    }
    renderGauges();
    beginMovementPhase();
  };
}

/* ---- turn order & per-car resolution (steps 3–9) */
function beginMovementPhase(){
  clearHighlights();
  const racers = G.players.filter(p=>!p.finished);
  racers.sort((a,b)=> b.total-a.total || a.spot-b.spot);
  G.queue = racers;
  // adrenaline: last car this round; last TWO if 5+ cars started the race
  const adrN = G.players.length >= 5 ? 2 : 1;
  G.adrenalineIds = racers.slice(-adrN).map(p=>p.id);
  nextInQueue();
}
function waitingPanel(msg){
  $("#panel").innerHTML = `
    <div class="phase-title">On track</div>
    <div class="phase-hint">${msg}</div>
    <div class="phase-hint" style="color:#6f6584">Open the race radio below to follow the action.</div>`;
}
async function nextInQueue(){
  const p = G.queue.shift();
  if(!p){ endRound(); return; }
  pointTurn(p);
  if(p.isBot){ waitingPanel(`${p.name} is driving…`); await botTurn(p); nextInQueue(); }
  else playerReveal();
}

/* ---- 3. Reveal & Move (player) */
function playerReveal(){
  const you=G.players[0];
  if(you.cluttered){ playerReplenish(); return; }
  // resolve stress (＋) now
  const notes=[];
  for(const c of you.play){
    if(isStress(c)){
      const r=flipForSpeed(you);
      c.resolved=r.v;
      if(r.card) you.play.push(Object.assign(r.card,{fromStress:true}));
      if(r.junk.length) notes.push(`Stress flip burned ${r.junk.length} card${r.junk.length>1?"s":""} off your deck`);
    }
  }
  const cardSpeed = you.play.reduce((s,c)=>{
    if(c.t==="speed") return s+c.v;
    if(c.t==="up5") return s+5;
    return s; // up0, stress shells, junk
  },0);
  you.speed = cardSpeed;
  const moved = moveCar(you, cardSpeed);
  const blocked = moved<cardSpeed;
  renderGauges();
  if(G.adrenalineIds.includes(you.id)){ you.adrenaline=true; }
  const panel=$("#panel");
  panel.innerHTML = `
    <div class="phase-title">3 · Reveal &amp; move</div>
    <div class="phase-hint">Speed <b style="color:var(--purple-glow)">${cardSpeed}</b>${blocked?` — blocked, only moved ${moved}`:""}. ${notes.join(". ")}${you.adrenaline?` <b style="color:var(--purple-glow)">Adrenaline!</b> You're among the last this round: +1 speed and +1 cooldown available.`:""}</div>
    ${heatForecastHTML(you, you.speed, you.crossings)}
    <div id="played"></div>
    <div class="btnrow"><button class="act" id="toreact">On to React</button></div>`;
  const pl=$("#played");
  you.play.forEach(c=>{ pl.appendChild(renderCard(c)); });
  log(`You reveal ${cardSpeed} speed${blocked?` (blocked at ${moved})`:""}.`,"me");
  const tk=arm();
  $("#toreact").onclick = ()=>{ if(live(tk)) playerReact(); };
}

/* ---- 5. React (cooldown / boost / adrenaline) */
function playerReact(){
  const tk=arm();
  const you=G.players[0];
  const baseCool = you.gear===1?3 : you.gear===2?1 : 0;
  if(you.cooldownLeft===undefined || !you._coolInit){ you.cooldownLeft = baseCool + (you.adrenaline?1:0); you._coolInit=true; }
  const heatInHand = you.hand.filter(isHeat).length;
  const panel=$("#panel");
  panel.innerHTML = `
    <div class="phase-title">5 · React</div>
    <div class="phase-hint">Use symbols in any order. Cooldown returns Heat from hand to the engine. Boost pays 1 Heat to flip a bonus speed card — it adds to your speed <b>and the corner bill below</b>.</div>
    ${heatForecastHTML(you, you.speed, you.crossings, "Owed at corner check")}
    ${engineBarHTML(you)}
    <div class="btnrow">
      <button class="act cool" id="coolbtn" ${you.cooldownLeft<1||heatInHand<1?"disabled":""}>Cooldown ×${you.cooldownLeft} <small>(${heatInHand}♨ in hand)</small></button>
      <button class="act hot" id="boostbtn" ${you.boostUsed||you.engine<1?"disabled":""}>Boost · 1 Heat</button>
    </div>
    <div class="btnrow">
      ${you.adrenaline && !you.adrSpeedUsed ? `<button class="act" id="adrbtn">Adrenaline +1 space</button>`:""}
      <button class="act secondary" id="donereact">Done reacting</button>
    </div>`;
  $("#coolbtn") && ($("#coolbtn").onclick=()=>{
    if(!live(tk)) return;
    const idx = you.hand.findIndex(isHeat);
    if(idx<0) return; // no Heat card in hand — nothing to cool (never mint heat)
    if(you.engine >= heatCap()){ toast("Engine already at the map's heat cap","hot"); return; }
    const c = you.hand.splice(idx,1)[0];   // the card leaves circulation…
    you.engine++;                          // …and becomes 1 engine heat: net zero
    you.cooldownLeft--;
    auditHeat(you,"cooldown");
    log(`Cooldown: 1 ${c.t==="upheat"?"upgrade ":""}Heat back into the engine.`,"me");
    renderGauges(); playerReact();
  });
  $("#boostbtn") && ($("#boostbtn").onclick=()=>{
    if(!live(tk)) return;
    payHeat(you,1); you.boostUsed=true;
    const r=flipForSpeed(you);
    if(r.card) you.discard.push(r.card);
    you.speed += r.v;
    const m=moveCar(you,r.v);
    log(`Boost! Flipped a ${r.v}${m<r.v?` (blocked at ${m})`:""}.`,"me");
    toast(`Boost +${r.v}`,"hot"); renderGauges(); playerReact();
  });
  $("#adrbtn") && ($("#adrbtn").onclick=()=>{
    if(!live(tk)) return;
    you.adrSpeedUsed=true; you.speed+=1;
    const m=moveCar(you,1);
    log(`Adrenaline: +1 speed${m<1?" (blocked)":""}.`,"me");
    renderGauges(); playerReact();
  });
  $("#donereact").onclick=()=>{ if(!live(tk)) return; you._coolInit=false; playerSlipstream(); };
}

/* ---- 6. Slipstream */
function playerSlipstream(){
  const you=G.players[0];
  const here=phys(you.total), ahead=phys(you.total+1);
  const eligible = carsAt(here,you).length>0 || carsAt(ahead,you).length>0;
  const wouldFinish = (you.total < G.laps*S) && (you.total+2 >= G.laps*S);
  if(!eligible || wouldFinish || finishedLine(you)){ playerCornerCheck(); return; }
  /* what slipping 2 would add to the corner bill (speed itself doesn't change) */
  const newCross = crossingsForMove(you.total, 2);
  const costNow  = cornerHeatCost(you.speed, you.crossings);
  const costSlip = cornerHeatCost(you.speed, [...you.crossings, ...newCross]);
  const delta = costSlip - costNow;
  let slipNote = "";
  if(newCross.length){
    if(costSlip > you.engine && delta > 0)
      slipNote = `<div class="forecast spin">Slipstreaming crosses a limit-${newCross.map(limitAt).join(" & ")} corner at speed ${you.speed} — total bill ${costSlip} Heat vs ${you.engine} in the engine: ⚠ SPIN OUT!</div>`;
    else if(delta > 0)
      slipNote = `<div class="forecast warn">Slipstreaming crosses a limit-${newCross.map(limitAt).join(" & ")} corner line — adds <b>+${delta} Heat</b> to the check (total ${costSlip}, engine ${you.engine}).</div>`;
    else
      slipNote = `<div class="forecast">Slipstreaming crosses a corner line, but speed ${you.speed} is under the limit — free.</div>`;
  }
  const panel=$("#panel");
  panel.innerHTML = `
    <div class="phase-title">6 · Slipstream</div>
    <div class="phase-hint">You're in the tow of another car. Take the full 2 free spaces? It doesn't add speed, but any corner line you cross still gets checked.</div>
    ${slipNote}
    <div class="btnrow">
      <button class="act" id="slipyes">Slipstream +2</button>
      <button class="act secondary" id="slipno">Stay put</button>
    </div>`;
  const tk=arm();
  $("#slipyes").onclick=()=>{
    if(!live(tk)) return;
    const m=moveCar(you,2);
    log(m>0?`You slipstream ${m} space${m>1?"s":""}.`:"Slipstream blocked — no move.","me");
    playerCornerCheck();
  };
  $("#slipno").onclick=()=>{ if(live(tk)) playerCornerCheck(); };
}

/* ---- 7. Check Corner */
function playerCornerCheck(){
  const you=G.players[0];
  const lines=[...new Set(you.crossings)].sort((a,b)=>a-b);
  for(const ct of lines){
    const lim=limitAt(ct);
    const excess = you.speed - lim;
    if(excess<=0){ log(`Corner (limit ${lim}) taken clean at speed ${you.speed}.`); continue; }
    if(you.engine>=excess){
      payHeat(you,excess);
      log(`Corner limit ${lim}, speed ${you.speed}: engine takes ${excess} Heat.`,"warn");
      toast(`Over the limit · ${excess} Heat`,"hot");
    }else{
      // spin out
      const paid=you.engine;
      you.discard.push(...Array(paid).fill().map(()=>makeCard("heat")));
      you.engine=0;
      let t=ct-1; while(spaceFull(phys(t),you)) t--;
      you.total=t; takeSpot(you); renderCars();
      const extra = you.gear<=2?1:2;
      for(let i=0;i<extra;i++) you.hand.push(makeCard("stress"));
      you.gear=1; you.spunOut=true;
      auditHeat(you,"spin out");
      log(`SPIN OUT at the limit-${lim} corner! ${paid} Heat gone, ${extra} Stress in hand, back to 1st gear.`,"warn");
      toast("SPIN OUT!","hot");
      break;
    }
  }
  you.crossings=[];
  renderGauges();
  playerDiscard();
}

/* ---- 8. Discard */
function playerDiscard(){
  const you=G.players[0];
  const options = you.hand.filter(discardable);
  if(options.length===0){ playerReplenish(); return; }
  const sel=new Set();
  const panel=$("#panel");
  panel.innerHTML = `
    <div class="phase-title">8 · Discard <span style="color:var(--cream-dim)">(optional)</span></div>
    <div class="phase-hint">Bin cards you don't want next round — you'll draw back to 7. Heat and Stress can't be discarded.</div>
    <div id="hand"></div>
    <div class="btnrow">
      <button class="act secondary" id="skipdisc">Keep hand</button>
      <button class="act" id="dodisc" disabled>Discard selected</button>
    </div>`;
  const handEl=$("#hand");
  you.hand.forEach(c=>{
    const el=renderCard(c);
    if(!discardable(c)) el.classList.add("dim");
    else el.onclick=()=>{ sel.has(c.id)?sel.delete(c.id):sel.add(c.id);
      el.classList.toggle("sel",sel.has(c.id)); $("#dodisc").disabled=sel.size===0; };
    handEl.appendChild(el);
  });
  const tk=arm();
  $("#skipdisc").onclick=()=>{ if(live(tk)) playerReplenish(); };
  $("#dodisc").onclick=()=>{
    if(!live(tk)) return;
    const going=you.hand.filter(c=>sel.has(c.id));
    you.hand=you.hand.filter(c=>!sel.has(c.id));
    you.discard.push(...going);
    log(`You discard ${going.length} card${going.length>1?"s":""}.`,"me");
    playerReplenish();
  };
}

/* ---- 9. Replenish */
function playerReplenish(){
  const you=G.players[0];
  you.discard.push(...you.play); you.play=[];
  drawToHand(you, 7-you.hand.length);
  renderGauges();
  checkFinish(you);
  nextInQueue();
}

/* ---------------- Legend (bot) turns — Legends module logic */
async function botTurn(p){
  if(!G.legendRevealed){
    G.legendRevealed=true;
    if(G.legendDeck.length===0) G.legendDeck=shuffle([...LEGEND_CARDS]);
    const c=G.legendDeck.pop();
    G.legendCard={ts:c.ts+G.difficulty, d:c.d};
    log(`Legend card: top speed ${G.legendCard.ts}, diamond ${G.legendCard.d}.`);
  }
  const {ts,d}=G.legendCard;
  const nc=nextCornerTotal(p.total);
  let move, why;
  if(nc===Infinity){ move=ts; why="flat out to the flag"; }
  else if(nc - p.total <= TRACK.legendsLine){
    // clearing the corner
    move = limitAt(nc)+d; why=`clears the corner (${limitAt(nc)}+${d})`;
    const nc2=nextCornerTotal(nc);
    if(p.total+move >= nc2) move = nc2 - 1 - p.total; // never 2 corners in one move
  }else if(p.total+ts < nc){ move=ts; why=`runs top speed ${ts}`; }
  else { move = (nc-1-d) - p.total; why=`brakes to ${d} before the corner`; }
  if(move>0){
    const m=moveCar(p,move,{trackCrossings:false});
    log(`${p.name} ${why} → ${m} space${m===1?"":"s"}${m<move?" (blocked)":""}.`);
  }else log(`${p.name} holds position.`);
  checkFinish(p);
  await wait(650);
}

/* player finished earlier: keep simulating bot rounds till race complete */
async function runBotsOnly(){
  waitingPanel("You're home — the remaining rivals race to the flag.");
  const racers=G.players.filter(p=>!p.finished);
  if(racers.length===0){ raceOver(); return; }
  racers.sort((a,b)=>b.total-a.total||a.spot-b.spot);
  G.legendRevealed=false;
  for(const p of racers){ pointTurn(p); await botTurn(p); }
  endRound();
}

/* ---------------- round end / finish */
function checkFinish(p){
  if(!p.finished && finishedLine(p)){
    p.finished=true; p.finishRound=G.round;
    G.finishOrder.push(p);
    log(`${p.isBot?p.name:"YOU"} take${p.isBot?"s":""} the chequered flag!`, p.isBot?"":"me");
    if(!p.isBot) toast("🏁 Chequered flag!");
    renderCars();
  }
}
function endRound(){
  renderStandings();
  const stillRacing=G.players.filter(p=>!p.finished);
  if(stillRacing.length===0){ raceOver(); return; }
  if(G.players[0].finished){
    // player is home — let the remaining rivals race to the flag
    setTimeout(()=>{ G.round++; $("#roundlbl").textContent=`Round ${G.round}`; runBotsOnly(); }, 500);
    return;
  }
  startRound();
}
function raceOver(){
  const order=[...G.finishOrder, ...G.players.filter(p=>!p.finished).sort((a,b)=>b.total-a.total)];
  const rows=order.map((p,i)=>`
    <div class="standrow"><div class="p">P${i+1}</div>
      <div class="dot" style="background:${p.color}"></div>
      <div>${p.isBot?p.name:"No. 17 — You"}</div>
      <div style="margin-left:auto;color:var(--cream-dim);font-size:12px">${p.finishRound?("R"+p.finishRound):"DNF"}</div>
    </div>`).join("");
  const youP = order.indexOf(G.players[0])+1;
  const el=$("#setup"); el.style.display="flex";
  el.innerHTML=`<div class="sheet">
    <h2>${youP===1?"🏆 Victory!":"Race over"}</h2>
    <div class="tag">${TRACK.name} · ${G.laps} lap${G.laps>1?"s":""} · you finished P${youP}</div>
    ${rows}
    <div class="btnrow" style="margin-top:18px"><button class="act" onclick="location.reload()">Race again</button></div>
  </div>`;
}

/* ---------------- heat helper */
function payHeat(p,n){
  const pay=Math.min(n,p.engine);
  p.engine-=pay;
  for(let i=0;i<pay;i++) p.discard.push(makeCard("heat"));
  auditHeat(p,"pay heat");
  renderGauges();
  return pay;
}

/* ---------------- rendering: cards, gauges, standings */
function renderCard(c){
  const d=cardLabel(c);
  const el=document.createElement("div");
  el.className="card "+d.cls;
  let extra="";
  if(c.t==="stress" && c.resolved!=null) extra=`<div class="ct" style="color:#fff">→ drew ${c.resolved}</div>`;
  if(c.fromStress) extra=`<div class="ct">from stress</div>`;
  el.innerHTML=`<div class="cv">${d.cv}</div><div class="ct">${d.ct}</div>${extra}`;
  return el;
}
function engineBarHTML(p){
  let pips="";
  for(let i=0;i<heatCap();i++) pips+=`<div class="hpip ${i<p.engine?"":"empty"}"></div>`;
  return `<div id="enginebar"><span class="elbl">Engine</span>${pips}<span class="elbl" style="margin-left:6px">${p.engine} in engine · pool ${totalHeat(p)}/${heatCap()}</span></div>`;
}
function renderGauges(){
  const you=G.players[0];
  $("#g-gear").textContent=you.gear;
  $("#g-heat").textContent=you.engine;
  $("#g-speed").textContent=you.speed||"–";
  $("#g-hand").textContent=you.hand.length;
  const order=[...G.players].sort((a,b)=>{
    if(a.finished&&b.finished) return G.finishOrder.indexOf(a)-G.finishOrder.indexOf(b);
    if(a.finished)return -1; if(b.finished)return 1;
    return b.total-a.total||a.spot-b.spot;
  });
  $("#g-pos").textContent="P"+(order.indexOf(you)+1);
  const lap=Math.min(G.laps, Math.floor(Math.max(you.total,0)/S)+1);
  $("#lapflag").textContent = you.finished? "🏁 Finished" : `Lap ${lap} / ${G.laps} · Round ${Math.max(G.round,1)}`;
  renderStandings(order);
}
function renderStandings(order){
  order = order || [...G.players].sort((a,b)=>{
    if(a.finished&&b.finished) return G.finishOrder.indexOf(a)-G.finishOrder.indexOf(b);
    if(a.finished)return -1; if(b.finished)return 1;
    return b.total-a.total||a.spot-b.spot;});
  $("#standings").innerHTML = order.map((p,i)=>`<div class="pos-chip" style="background:${p.color}" title="${p.name}">${i+1}</div>`).join("");
}

/* ---------------- track drawing */
let PTS=[];          // per-space {x,y,nx,ny} (n = unit normal toward racing line)
let carLayer, ptrEl, hlLayer, SPACING=12;

/* ----- landing highlights (card-selection preview) */
function clearHighlights(){ if(hlLayer) hlLayer.innerHTML=""; }
/* items: [{total, kind:"exact"|"range"}] — kind sets colour/intensity */
function highlightSpaces(items){
  clearHighlights();
  if(!hlLayer) return;
  const NS="http://www.w3.org/2000/svg";
  const half=Math.max(3, SPACING/2 - 1.2);
  for(const it of items){
    const p=PTS[phys(it.total)];
    const ln=document.createElementNS(NS,"line");
    ln.setAttribute("x1",p.x-p.tx*half); ln.setAttribute("y1",p.y-p.ty*half);
    ln.setAttribute("x2",p.x+p.tx*half); ln.setAttribute("y2",p.y+p.ty*half);
    ln.setAttribute("stroke", it.kind==="exact" ? "#a985ff" : "#d8c23a");
    ln.setAttribute("stroke-width","36");
    ln.setAttribute("class","landhl "+it.kind);
    hlLayer.appendChild(ln);
  }
}
function buildTrack(){
  const svg=$("#tracksvg");
  const NS="http://www.w3.org/2000/svg";
  svg.innerHTML="";
  // per-space geometry from the traced board points (tangents/normals from neighbours)
  const P = TRACK.spacePts;
  PTS=[]; let total=0;
  for(let i=0;i<S;i++){
    const a=P[(i-1+S)%S], b=P[i], c=P[(i+1)%S];
    const dx=c[0]-a[0], dy=c[1]-a[1], len=Math.hypot(dx,dy)||1;
    PTS.push({x:b[0], y:b[1], tx:dx/len, ty:dy/len, nx:dy/len, ny:-dx/len});
    total += Math.hypot(c[0]-b[0], c[1]-b[1]);
  }
  SPACING = total/S;
  // SVG art rendition of the board — always drawn first. If the scanned
  // board photo loads it simply covers this; if the file is missing the
  // art board IS the board (no broken-image glyph, fully playable).
  drawArtBoard(svg);
  hlLayer=document.createElementNS(NS,"g");   // landing previews sit under the cars
  svg.appendChild(hlLayer);
  // pointer for whose turn
  ptrEl=document.createElementNS(NS,"path");
  ptrEl.setAttribute("d","M0,-8 L6,4 L-6,4 Z"); ptrEl.setAttribute("fill","#ffd166");
  ptrEl.setAttribute("id","turnptr"); ptrEl.style.opacity="0";
  svg.appendChild(ptrEl);
  carLayer=document.createElementNS(NS,"g");
  svg.appendChild(carLayer);
  // try the board photo; only attach it if it genuinely loads
  const probe=new Image();
  probe.onload=()=>{
    const img=document.createElementNS(NS,"image");
    img.setAttribute("href",TRACK.image);
    img.setAttribute("x",0); img.setAttribute("y",0);
    img.setAttribute("width",TRACK.imgW); img.setAttribute("height",TRACK.imgH);
    img.setAttribute("preserveAspectRatio","xMidYMid slice");
    svg.insertBefore(img, hlLayer);   // photo covers the art, sits under highlights/cars
  };
  probe.src=TRACK.image;
}

/* ---------------- SVG art board (fallback when the photo is missing) */
function drawArtBoard(svg){
  const NS="http://www.w3.org/2000/svg";
  const P=TRACK.spacePts;
  const g=document.createElementNS(NS,"g");
  g.setAttribute("id","artboard");
  const el=(n,at)=>{ const e=document.createElementNS(NS,n); for(const k in at) e.setAttribute(k,at[k]); return e; };
  const bnd=i=>{  // boundary geometry before space i: midpoint, tangent, normal
    const a=P[((i-1)%S+S)%S], b=P[((i)%S+S)%S];
    const dx=b[0]-a[0], dy=b[1]-a[1], L=Math.hypot(dx,dy)||1;
    return {x:(a[0]+b[0])/2, y:(a[1]+b[1])/2, tx:dx/L, ty:dy/L, nx:dy/L, ny:-dx/L};
  };
  // countryside base + deterministic field patches for a satellite feel
  g.appendChild(el("rect",{x:0,y:0,width:TRACK.imgW,height:TRACK.imgH,fill:"#57713f"}));
  let seed=1234567; const rnd=()=> (seed=(seed*16807)%2147483647)/2147483647;
  const fieldCols=["#4c6636","#5f7a45","#66854a","#43592f","#6f8b52"];
  for(let i=0;i<26;i++){
    const x=rnd()*TRACK.imgW, y=rnd()*TRACK.imgH, rx=60+rnd()*140, ry=40+rnd()*90;
    g.appendChild(el("ellipse",{cx:x,cy:y,rx,ry,fill:fieldCols[i%5],opacity:.5,
      transform:`rotate(${(rnd()*180).toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)})`}));
  }
  // mowed infield rings (the old horse-racing oval inside Pukekohe)
  g.appendChild(el("ellipse",{cx:560,cy:330,rx:340,ry:175,fill:"#3f5531",opacity:.85}));
  g.appendChild(el("ellipse",{cx:560,cy:330,rx:255,ry:120,fill:"#54703d",opacity:.9}));
  const d="M "+P.map(p=>p[0]+" "+p[1]).join(" L ")+" Z";
  // verge shadow → cream verge → red/white kerbs at corners → tarmac → centreline
  g.appendChild(el("path",{d,fill:"none",stroke:"#2b241f","stroke-width":58,"stroke-linejoin":"round",opacity:.3}));
  g.appendChild(el("path",{d,fill:"none",stroke:"#e8e0cc","stroke-width":50,"stroke-linejoin":"round"}));
  for(const c of TRACK.corners){
    const seg=[]; for(let j=-3;j<=2;j++) seg.push(P[((c.at+j)%S+S)%S]);
    g.appendChild(el("path",{d:"M "+seg.map(p=>p[0]+" "+p[1]).join(" L "),fill:"none",
      stroke:"#c8402e","stroke-width":52,"stroke-dasharray":"9 11","stroke-linecap":"butt"}));
  }
  g.appendChild(el("path",{d,fill:"none",stroke:"#241f28","stroke-width":44,"stroke-linejoin":"round"}));
  g.appendChild(el("path",{d,fill:"none",stroke:"#cfc7b4","stroke-width":1.6,"stroke-dasharray":"12 14",opacity:.65}));
  // space separators
  for(let i=0;i<S;i++){
    const b=bnd(i+1);
    g.appendChild(el("line",{x1:b.x-b.nx*21,y1:b.y-b.ny*21,x2:b.x+b.nx*21,y2:b.y+b.ny*21,
      stroke:"#57505f","stroke-width":1.4}));
  }
  // corner lines + speed-limit badges
  for(const c of TRACK.corners){
    const b=bnd(c.at);
    g.appendChild(el("line",{x1:b.x-b.nx*25,y1:b.y-b.ny*25,x2:b.x+b.nx*25,y2:b.y+b.ny*25,
      stroke:"#ffb03d","stroke-width":4}));
    const bx=b.x-b.nx*48, by=b.y-b.ny*48;
    const badge=el("g",{class:"cornerbadge"});
    badge.appendChild(el("circle",{cx:bx,cy:by,r:16}));
    const t=el("text",{x:bx,y:by+6,"font-size":"18"}); t.textContent=c.limit;
    badge.appendChild(t);
    g.appendChild(badge);
  }
  // finish line: two offset checker rows on the boundary before space 0
  {
    const b=bnd(0);
    for(const off of [-2.5,2.5]){
      const x1=b.x-b.nx*22+b.tx*off, y1=b.y-b.ny*22+b.ty*off;
      const x2=b.x+b.nx*22+b.tx*off, y2=b.y+b.ny*22+b.ty*off;
      g.appendChild(el("line",{x1,y1,x2,y2,stroke:"#f4f1e8","stroke-width":5}));
      g.appendChild(el("line",{x1,y1,x2,y2,stroke:"#141414","stroke-width":5,
        "stroke-dasharray":"5 5","stroke-dashoffset":off>0?5:0}));
    }
  }
  // event plate, bottom-right
  const rot='rotate(-2 1025 712)';
  g.appendChild(el("rect",{x:875,y:655,width:300,height:115,rx:6,fill:"#efe6d0",
    stroke:"#b23227","stroke-width":6,transform:rot}));
  const t1=el("text",{x:1025,y:697,"text-anchor":"middle","font-size":"21","font-weight":"800",
    fill:"#173a2a","letter-spacing":"3",transform:rot});
  t1.textContent="NEW ZEALAND GRAND PRIX";
  const t2=el("text",{x:1025,y:742,"text-anchor":"middle","font-size":"40","font-weight":"800",
    fill:"#0f5132","letter-spacing":"4",transform:rot});
  t2.textContent="PUKEKOHE";
  g.append(t1,t2);
  svg.appendChild(g);
}
function spotXY(total,spot){
  const p=PTS[phys(total)];
  const off = spot===0? -9 : 9; // racing line = inner printed lane
  return {x:p.x+p.nx*off, y:p.y+p.ny*off};
}
function renderCars(){
  const NS="http://www.w3.org/2000/svg";
  for(const p of G.players){
    let g=document.getElementById("car-"+p.id);
    if(!g){
      g=document.createElementNS(NS,"g"); g.setAttribute("id","car-"+p.id); g.setAttribute("class","car");
      const body=document.createElementNS(NS,"circle");
      body.setAttribute("r", p.isBot?9:10.5); body.setAttribute("fill",p.color);
      body.setAttribute("stroke", p.isBot?"#111":"#fff"); body.setAttribute("stroke-width", p.isBot?1.5:2.2);
      const num=document.createElementNS(NS,"text");
      num.setAttribute("text-anchor","middle"); num.setAttribute("y","3.6");
      num.setAttribute("font-size","9"); num.setAttribute("font-weight","800");
      num.setAttribute("fill", p.isBot?"#111":"#fff");
      num.textContent = p.isBot? p.name.match(/\d+/)[0] : "17";
      g.append(body,num); carLayer.appendChild(g);
    }
    if(p.finished){ g.style.opacity="0"; continue; }
    const {x,y}=spotXY(p.total,p.spot);
    g.setAttribute("transform",`translate(${x},${y})`);
  }
}
function pointTurn(p){
  if(!ptrEl) return;
  if(p.finished){ ptrEl.style.opacity="0"; return; }
  const {x,y}=spotXY(p.total,p.spot);
  ptrEl.style.opacity="1";
  ptrEl.setAttribute("transform",`translate(${x},${y-18})`);
}

/* ---------------- boot */
buildTrack();
renderCars();
showSetup();
</script>
